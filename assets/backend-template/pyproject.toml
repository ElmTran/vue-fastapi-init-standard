[project]
name = "backend-starter"
version = "0.1.0"
description = "FastAPI starter generated from vue-fastapi-init-standard"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "fastapi>=0.116.0",
  "pydantic-settings>=2.10.0",
  "python-json-logger>=3.3.0",
  "uvicorn[standard]>=0.35.0",
]

[dependency-groups]
dev = [
  "httpx>=0.28.0",
  "pytest>=8.4.0",
  "pytest-asyncio>=1.1.0",
]